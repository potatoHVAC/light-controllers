<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111">
  <link rel="stylesheet" href="/static/app.css">
  <title>Light Controllers — Admin</title>
</head>
<body>
  <h1>Admin <a href="/">&larr; control</a></h1>
  <div id="bridge-banner" class="bridge-banner hidden">Bridge offline &mdash; deploy and identify disabled</div>

  <div class="card">
    <h2>Mesh</h2>
    <div class="status">
      Controllers <b id="count">—</b> &nbsp; <span id="bridge"></span> <span id="auto"></span><br>
      Theme <b id="theme">—</b> &nbsp; Scene <b id="scene">—</b> &nbsp; Dim <b id="dim">—</b><br>
      Firmware <b id="version" class="muted">—</b>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h2 style="margin:0">Show Defaults</h2>
      <button style="font-size:11px;padding:4px 8px;flex:none" onclick="toggleDefaultsEdit()">Edit</button>
    </div>
    <div id="defaults-display" class="muted">Loading…</div>
    <div id="defaults-editor" style="display:none;margin-top:12px">
      <label>Show theme</label><select id="def_theme"></select>
      <label>Show scene</label><input type="text" id="def_scene">
      <label>Show color (hex)</label><input type="text" id="def_color">
      <label>Show strip LED counts</label>
      <div class="strips">
        <input type="number" id="def_s1" min="0">
        <input type="number" id="def_s2" min="0">
        <input type="number" id="def_s3" min="0">
      </div>
      <div class="row" style="margin-top:12px">
        <button onclick="saveDefaults()">Save</button>
        <button onclick="toggleDefaultsEdit()">Cancel</button>
      </div>
      <div id="defstatus" class="muted" style="margin-top:6px"></div>
    </div>
  </div>

  <div class="card">
    <h2>Firmware version <button style="font-size:11px;padding:4px 8px;flex:none" onclick="toggleHashDebug()">debug</button></h2>
    <div id="hashdebug" style="display:none;margin-top:8px">
      <div id="hashdetail" class="muted">Loading…</div>
    </div>
  </div>

  <div class="card">
    <h2>Firmware deploy</h2>
    <div class="row">
      <button data-needs-bridge class="warnbtn" onclick="deployFirmware('deploy_outdated')">Deploy Outdated</button>
      <button data-needs-bridge class="warnbtn" onclick="deployFirmware('deploy_all')">Deploy All</button>
    </div>
    <div id="fwstatus" class="muted" style="margin-top:6px"></div>
    <div class="row" style="margin-top:10px">
      <button data-needs-bridge onclick="deployConfigs()">Deploy All Configs</button>
    </div>
    <div id="cfgdeploystatus" class="muted" style="margin-top:6px"></div>
  </div>

  <div class="card">
    <h2>Controllers</h2>
    <div id="controllers"><div class="muted">Loading…</div></div>
  </div>

  <div id="editor-anchor"></div>
  <div id="config-editor" class="card" style="display:none">
    <h2 id="editortitle">Edit config</h2>
    <input type="hidden" id="cfg_mac">
    <label>Nickname</label><input type="text" id="cfg_nickname">
    <label>Strip LED counts (0 = none)</label>
    <div class="strips">
      <input type="number" id="cfg_s1" min="0" placeholder="strip 1">
      <input type="number" id="cfg_s2" min="0" placeholder="strip 2">
      <input type="number" id="cfg_s3" min="0" placeholder="strip 3">
    </div>
    <label>Tags (comma separated — e.g. percussion, low)</label>
    <input type="text" id="cfg_tags" placeholder="agnostic groupings">
    <label>Default theme</label><select id="cfg_theme"></select>
    <label>Default scene</label><input type="text" id="cfg_scene" placeholder="scene name">
    <label>Default color (hex, optional)</label><input type="text" id="cfg_color" placeholder="#ff0000">
    <div class="row" style="margin-top:12px">
      <button onclick="saveConfig()">Save &amp; Push</button>
      <button class="danger" onclick="deleteConfig()">Delete</button>
      <button onclick="closeEditor()">Close</button>
    </div>
    <div id="cfgstatus" class="muted" style="margin-top:6px"></div>
  </div>

  <div class="card">
    <h2>Server log</h2>
    <div id="server-log"><div class="entry info">Loading…</div></div>
  </div>

  <div class="card">
    <h2>Mesh log</h2>
    <div id="mesh-log"><div class="entry info">Loading…</div></div>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/admin.js"></script>
</body>
</html>
