<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/static/app.css">
  <title>Light Controllers</title>
</head>
<body>
  <h1>Light Controllers <a href="/admin">admin &rarr;</a></h1>

  <div class="card">
    <div class="status">
      Theme <b id="theme">—</b> &nbsp; Scene <b id="scene">—</b><br>
      Dim <b id="dim">—</b> &nbsp; Controllers <b id="count">—</b><br>
      <span id="bridge"></span> <span id="auto"></span>
    </div>
  </div>

  <div class="card">
    <h2>Show</h2>
    <div class="row">
      <button onclick="act('next_scene')">Next Scene</button>
      <button onclick="act('next_theme')">Next Theme</button>
    </div>
    <div class="row">
      <button onclick="act('random_scene')">Random Scene</button>
      <button onclick="act('random_theme_scene')">Random Theme</button>
    </div>
    <div class="row">
      <button onclick="act('default_show')">Default Show</button>
      <button onclick="act('default_user')">Everyone&rarr;Personal</button>
    </div>
    <label>Master Dim <span id="dimval">100</span>%</label>
    <input type="range" id="dimslider" min="0" max="100" value="100"
      oninput="el('dimval').textContent=this.value"
      onchange="api.post('dim',{dim:this.value/100})">
  </div>

  <div class="card">
    <h2>Soloist — tap a controller</h2>
    <div class="grid" id="grid"><div class="muted">Loading…</div></div>
    <button class="solo wide" style="margin-top:10px" onclick="act('release_solo')">Release Solo</button>
  </div>

  <div class="card">
    <h2>Log</h2>
    <div id="log"><div class="entry info">Loading…</div></div>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/control.js"></script>
</body>
</html>
