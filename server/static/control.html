<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/static/app.css">
  <title>Light Controllers</title>
</head>
<body>
  <nav class="nav">
    <a href="/" class="active">Control</a>
    <a href="/admin">Admin</a>
    <a href="/shows">Shows</a>
  </nav>
  <div id="bridge-banner" class="bridge-banner hidden">Bridge offline &mdash; send actions disabled</div>

  <div class="card">
    <div id="show-name" class="show-name"></div>
    <div class="status">
      Theme <b id="theme">—</b> &nbsp; Scene <b id="scene">—</b><br>
      Dim <b id="dim">—</b> &nbsp; Controllers <b id="count">—</b><br>
      <span id="bridge"></span> <span id="auto"></span>
    </div>
  </div>

  <div class="card">
    <h2>Show</h2>
    <div class="row">
      <button data-needs-bridge onclick="act('next_theme')">Next Theme</button>
      <button data-needs-bridge onclick="act('next_scene')">Next Scene</button>
    </div>
    <div class="row">
      <button data-needs-bridge onclick="act('random_scene')">Random Scene</button>
      <button data-needs-bridge onclick="act('random_theme_scene')">Random Theme</button>
    </div>
    <div class="row">
      <button data-needs-bridge onclick="act('default_show')">Default Show</button>
      <button data-needs-bridge onclick="act('default_user')">Personal Defaults</button>
    </div>
    <label>Master Dim <span id="dimval">100</span>%</label>
    <input data-needs-bridge type="range" id="dimslider" min="0" max="100" value="100"
      oninput="el('dimval').textContent=this.value"
      onchange="onDimChange(this)">
    <button data-needs-bridge id="lights-off-btn" class="wide" style="margin-top:8px"
      onclick="toggleLightsOff()">Lights Off</button>
  </div>

  <div class="card">
    <h2>Soloist — tap a controller</h2>
    <label>Background Dim <span id="bgdimval">25</span>%</label>
    <input data-needs-bridge type="range" id="bgdimslider" min="0" max="100" value="25"
      oninput="el('bgdimval').textContent=this.value"
      onchange="onBgDimChange()">
    <div class="grid" id="grid" style="margin-top:10px"><div class="muted">Loading…</div></div>
    <button data-needs-bridge id="release-solo-btn" class="release-solo wide" style="margin-top:10px" onclick="act('release_solo')">Release Solo</button>
    <div id="tag-solo-btns" class="row" style="margin-top:8px"></div>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/control.js"></script>
</body>
</html>
